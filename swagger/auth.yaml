openapi: 3.0.3
info:
  title: 内容喵 API - auth
  version: 1.0.0
  description: auth模块接口文档
servers:
  - url: http://localhost:3000
    description: 开发环境
  - url: https://api.neirongmiao.com
    description: 生产环境
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token 认证
  schemas:
    Error:
      type: object
      required:
        - error
        - message
        - statusCode
      properties:
        error:
          type: string
          description: 错误类型标识
          example: UnauthorizedError
        message:
          type: string
          description: 错误详细信息
          example: 无效的认证令牌
        statusCode:
          type: integer
          description: HTTP 状态码
          example: 401
    UserInfo:
      type: object
      properties:
        id:
          type: string
          description: 用户唯一标识
        email:
          type: string
          format: email
          description: 用户邮箱
        role:
          type: string
          enum:
            - user
            - admin
          description: 用户角色
    def-0:
      type: object
      required:
        - error
        - message
        - statusCode
      properties:
        error:
          type: string
          description: 错误类型标识
          example: UnauthorizedError
        message:
          type: string
          description: 错误详细信息
          example: 无效的认证令牌
        statusCode:
          type: integer
          description: HTTP 状态码
          example: 401
      title: Error
    def-1:
      type: object
      properties:
        id:
          type: string
          description: 用户唯一标识
        email:
          type: string
          format: email
          description: 用户邮箱
        role:
          type: string
          enum:
            - user
            - admin
          description: 用户角色
      title: UserInfo
security:
  - bearerAuth: []
paths:
  /neirongmiao/api/auth/register:
    post:
      summary: 用户注册
      tags:
        - 认证
      description: 创建新用户账号，默认角色为 user，仅管理员可创建 admin 角色
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: 用户邮箱地址
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  description: 用户密码，最少6位
                  example: password123
                role:
                  type: string
                  enum:
                    - user
                    - admin
                  description: 用户角色（可选，默认为 user，admin 需特殊权限）
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/def-1"
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/def-0"
        "409":
          description: 邮箱已存在
          content:
            application/json:
              schema:
                type: object
                description: 邮箱已存在
                properties:
                  error:
                    type: string
                    example: ConflictError
                  message:
                    type: string
                    example: 该邮箱已被注册
                  statusCode:
                    type: integer
                    example: 409
  /neirongmiao/api/auth/login:
    post:
      summary: 用户登录
      tags:
        - 认证
      description: 使用邮箱和密码登录，返回 JWT token 和用户信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: 用户邮箱地址
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  description: 用户密码
                  example: password123
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT 认证令牌
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: "#/components/schemas/def-1"
        "401":
          description: 认证失败
          content:
            application/json:
              schema:
                type: object
                description: 认证失败
                properties:
                  error:
                    type: string
                    example: UnauthorizedError
                  message:
                    type: string
                    example: 邮箱或密码错误
                  statusCode:
                    type: integer
                    example: 401
  /neirongmiao/api/auth/forgot-password:
    get:
      summary: 忘记密码
      tags:
        - 认证
      description: 忘记密码功能占位接口（暂未实现）
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: 提示信息
                    example: 请联系管理员重置密码
  /neirongmiao/api/auth/douyin/status:
    get:
      summary: 抖音登录状态
      tags:
        - 认证
      description: 检查抖音 OAuth 登录配置是否完整
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                    description: 抖音登录是否已配置完成
                    example: true
                  missing:
                    type: array
                    items:
                      type: string
                    description: 缺失的配置项
                    example: []
                  configured:
                    type: object
                    properties:
                      appId:
                        type: boolean
                      appSecret:
                        type: boolean
                      redirectUri:
                        type: boolean
                    description: 各配置项是否已设置
  /neirongmiao/api/me/password:
    post:
      summary: 修改密码
      tags:
        - 认证
      description: 用户修改自己的密码，需要提供当前密码和新密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - nextPassword
              properties:
                currentPassword:
                  type: string
                  minLength: 6
                  description: 当前密码
                nextPassword:
                  type: string
                  minLength: 6
                  description: 新密码
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: 成功信息
                    example: 密码已更新
        "400":
          description: 密码验证失败
          content:
            application/json:
              schema:
                type: object
                description: 密码验证失败
                properties:
                  error:
                    type: string
                    example: ValidationError
                  message:
                    type: string
                    example: 当前密码不正确
                  statusCode:
                    type: integer
                    example: 400
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/def-0"
