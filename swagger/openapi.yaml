  /neirongmiao/api/auth/register:
    post:
      summary: 用户注册
      tags:
        - 认证
      description: 创建新用户账号，默认角色为 user，仅管理员可创建 admin 角色
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: 用户邮箱地址
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  description: 用户密码，最少6位
                  example: password123
                role:
                  type: string
                  enum:
                    - user
                    - admin
                  description: 用户角色（可选，默认为 user，admin 需特殊权限）
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/def-1"
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/def-0"
        "409":
          description: 邮箱已存在
          content:
            application/json:
              schema:
                type: object
                description: 邮箱已存在
                properties:
                  error:
                    type: string
                    example: ConflictError
                  message:
                    type: string
                    example: 该邮箱已被注册
                  statusCode:
                    type: integer
                    example: 409
  /neirongmiao/api/auth/login:
    post:
      summary: 用户登录
      tags:
        - 认证
      description: 使用邮箱和密码登录，返回 JWT token 和用户信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: 用户邮箱地址
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  description: 用户密码
                  example: password123
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT 认证令牌
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: "#/components/schemas/def-1"
        "401":
          description: 认证失败
          content:
            application/json:
              schema:
                type: object
                description: 认证失败
                properties:
                  error:
                    type: string
                    example: UnauthorizedError
                  message:
                    type: string
                    example: 邮箱或密码错误
                  statusCode:
                    type: integer
                    example: 401
  /neirongmiao/api/auth/forgot-password:
