  /neirongmiao/api/auth/douyin/status:
    get:
      summary: 抖音登录状态
      tags:
        - 认证
      description: 检查抖音 OAuth 登录配置是否完整
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                    description: 抖音登录是否已配置完成
                    example: true
                  missing:
                    type: array
                    items:
                      type: string
                    description: 缺失的配置项
                    example: []
                  configured:
                    type: object
                    properties:
                      appId:
                        type: boolean
                      appSecret:
                        type: boolean
                      redirectUri:
                        type: boolean
                    description: 各配置项是否已设置
  /neirongmiao/api/me/password:
    post:
      summary: 修改密码
      tags:
        - 认证
      description: 用户修改自己的密码，需要提供当前密码和新密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - nextPassword
              properties:
                currentPassword:
                  type: string
                  minLength: 6
                  description: 当前密码
                nextPassword:
                  type: string
                  minLength: 6
                  description: 新密码
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: 成功信息
                    example: 密码已更新
        "400":
          description: 密码验证失败
          content:
            application/json:
              schema:
                type: object
                description: 密码验证失败
                properties:
                  error:
                    type: string
                    example: ValidationError
                  message:
                    type: string
                    example: 当前密码不正确
                  statusCode:
                    type: integer
                    example: 400
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/def-0"
