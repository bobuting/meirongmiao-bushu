components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token 认证
  schemas:
    Error:
      type: object
      required:
        - error
        - message
        - statusCode
      properties:
        error:
          type: string
          description: 错误类型标识
          example: UnauthorizedError
        message:
          type: string
          description: 错误详细信息
          example: 无效的认证令牌
        statusCode:
          type: integer
          description: HTTP 状态码
          example: 401
    UserInfo:
      type: object
      properties:
        id:
          type: string
          description: 用户唯一标识
        email:
          type: string
          format: email
          description: 用户邮箱
        role:
          type: string
          enum:
            - user
            - admin
          description: 用户角色
    def-0:
      type: object
      required:
        - error
        - message
        - statusCode
      properties:
        error:
          type: string
          description: 错误类型标识
          example: UnauthorizedError
        message:
          type: string
          description: 错误详细信息
          example: 无效的认证令牌
        statusCode:
          type: integer
          description: HTTP 状态码
          example: 401
      title: Error
    def-1:
      type: object
      properties:
        id:
          type: string
          description: 用户唯一标识
        email:
          type: string
          format: email
          description: 用户邮箱
        role:
          type: string
          enum:
            - user
            - admin
          description: 用户角色
      title: UserInfo
