<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容喵 · 抖音发布助手 - 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #f9fafb;
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .section {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .account-info { flex: 1; }
    .account-info .label { font-weight: 500; margin-bottom: 2px; }
    .account-info .meta { font-size: 12px; color: #6b7280; }
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-danger { background: #fef2f2; color: #dc2626; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .empty-state {
      text-align: center;
      padding: 24px;
      color: #9ca3af;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
    }
    .form-group input:focus { outline: none; border-color: #2563eb; }
  </style>
</head>
<body>
  <h1>内容喵 · 抖音发布助手</h1>

  <div class="section">
    <h2>抖音账号管理</h2>
    <div id="accountList"></div>
    <button id="addAccountBtn" class="btn btn-primary" style="margin-top: 12px;">
      添加账号
    </button>
  </div>

  <div class="section">
    <h2>后端连接配置</h2>
    <div class="form-group">
      <label>API 地址</label>
      <input id="apiUrl" type="text" placeholder="http://localhost:3020" />
    </div>
    <div class="form-group">
      <label>认证 Token</label>
      <input id="authToken" type="password" placeholder="Bearer Token" />
    </div>
    <button id="saveConfigBtn" class="btn btn-primary">保存配置</button>
  </div>

  <script src="./index.tsx" type="module"></script>
</body>
</html>
