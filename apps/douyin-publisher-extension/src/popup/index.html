<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容喵 · 抖音发布助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #ffffff;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .status-badge {
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-badge.connected { background: #dcfce7; color: #166534; }
    .status-badge.disconnected { background: #fef2f2; color: #991b1b; }
    .content { padding: 16px 20px; }
    .account-list { margin-bottom: 16px; }
    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .account-item .label { font-weight: 500; }
    .account-item .status { font-size: 12px; }
    .account-item .status.active { color: #16a34a; }
    .account-item .status.expired { color: #dc2626; }
    .account-item .status.pending { color: #d97706; }
    .empty-state { color: #9ca3af; text-align: center; padding: 20px 0; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .job-status {
      margin-top: 12px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
    }
    .job-status .stage { font-weight: 500; margin-bottom: 4px; }
    .job-status .message { font-size: 12px; color: #6b7280; }
    .config-info {
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #f9fafb;
      border-radius: 8px;
      display: none;
    }
    .config-detail { display: flex; align-items: center; gap: 8px; font-size: 12px; line-height: 1.8; }
    .config-label { color: #6b7280; min-width: 36px; }
    .config-value { color: #374151; font-family: monospace; word-break: break-all; }
    .config-missing { color: #d97706; }
  </style>
</head>
<body>
  <div class="header">
    <h1>内容喵 · 抖音发布助手</h1>
    <span id="connectionStatus" class="status-badge disconnected">未连接</span>
  </div>
  <div class="content">
    <div id="configInfo" class="config-info"></div>
    <div id="accountSection" class="account-list">
      <div class="empty-state">暂无绑定账号</div>
    </div>
    <button id="addAccountBtn" class="btn btn-primary">添加抖音账号</button>
    <div id="addAccountStatus" style="display:none; margin-top:8px; font-size:12px; text-align:center;"></div>
    <button id="syncAccountsBtn" class="btn btn-secondary" style="margin-top: 8px;">
      同步账号（从网页端）
    </button>
    <div id="syncAccountsStatus" style="display:none; margin-top:8px; font-size:12px; text-align:center;"></div>
    <button id="openOptionsBtn" class="btn btn-secondary" style="margin-top: 8px;">
      管理账号 & 设置
    </button>
    <div id="jobStatus" class="job-status" style="display: none;">
      <div class="stage" id="jobStage"></div>
      <div class="message" id="jobMessage"></div>
    </div>
  </div>
  <script src="./index.tsx" type="module"></script>
</body>
</html>
